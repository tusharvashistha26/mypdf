services:
  - type: web
    name: mypdf
    env: python

    buildCommand: |
      pip install -r requirements.txt

      apt-get update && apt-get install -y \
      libreoffice \
      libreoffice-writer \
      libreoffice-core \
      libreoffice-common \
      fonts-dejavu \
      fonts-liberation \
      ghostscript \
      unoconv

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
